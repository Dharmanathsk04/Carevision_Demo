<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareVision Login</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000000;
    overflow: hidden;
    position: relative;
}

.mesh-gradient {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #020617, #022c22, #0a2a2a, #1e1b4b);
    background-size: 400% 400%;
    animation: meshFlow 20s ease infinite;
    filter: blur(80px);
    opacity: 0.8;
}

@keyframes meshFlow {
    0%, 100% { background-position: 0% 50%; }
    25% { background-position: 100% 50%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }
}

.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    animation: orbFloat 15s infinite ease-in-out;
}

.orb1 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, #14b8a6, transparent);
    top: -200px;
    left: -200px;
    animation-delay: 0s;
}

.orb2 {
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, #3b82f6, transparent);
    bottom: -150px;
    right: -150px;
    animation-delay: 5s;
}

.orb3 {
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, #8b5cf6, transparent);
    top: 50%;
    right: 10%;
    animation-delay: 10s;
}

@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, -50px) scale(1.1); }
    66% { transform: translate(-50px, 50px) scale(0.9); }
}

.grid-overlay {
    position: fixed;
    inset: 0;
    background-image: 
        linear-gradient(rgba(20, 184, 166, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 184, 166, 0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridPan 20s linear infinite;
    mask-image: radial-gradient(circle at center, black, transparent 70%);
}

@keyframes gridPan {
    0% { background-position: 0 0; }
    100% { background-position: 50px 50px; }
}

.particle {
    position: absolute;
    background: #5eead4;
    border-radius: 50%;
    pointer-events: none;
    animation: particleRise linear infinite;
    box-shadow: 0 0 10px rgba(94, 234, 212, 0.8);
}

@keyframes particleRise {
    0% {
        transform: translateY(0) translateX(0) scale(0);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 0.8;
    }
    100% {
        transform: translateY(-100vh) translateX(100px) scale(1);
        opacity: 0;
    }
}

.ecg-container {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.15;
}

.ecg-line {
    position: absolute;
    width: 200%;
    height: 100px;
    left: -50%;
}

.ecg-line svg {
    width: 100%;
    height: 100%;
}

.ecg-path {
    fill: none;
    stroke: #14b8a6;
    stroke-width: 2;
    filter: drop-shadow(0 0 8px rgba(20, 184, 166, 0.6));
    animation: ecgDraw 3s linear infinite;
}

@keyframes ecgDraw {
    0% { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -2000; }
}

.login-card {
    position: relative;
    width: 460px;
    padding: 56px;
    border-radius: 32px;
    background: rgba(2, 28, 27, 0.4);
    backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(94, 234, 212, 0.2);
    box-shadow: 
        0 0 60px rgba(20, 184, 166, 0.3),
        inset 0 0 40px rgba(15, 118, 110, 0.15),
        0 30px 60px rgba(0, 0, 0, 0.5);
    z-index: 10;
    animation: cardEntrance 0.8s ease-out;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes cardEntrance {
    0% {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.login-card:hover {
    transform: translateY(-8px);
    box-shadow: 
        0 0 80px rgba(20, 184, 166, 0.5),
        inset 0 0 50px rgba(15, 118, 110, 0.25),
        0 40px 80px rgba(0, 0, 0, 0.6);
    border-color: rgba(94, 234, 212, 0.4);
}

.login-card::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 32px;
    background: linear-gradient(135deg, #14b8a6, #3b82f6, #8b5cf6, #14b8a6);
    background-size: 300% 300%;
    animation: borderGlow 5s linear infinite;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: -1;
}

.login-card:hover::before {
    opacity: 0.6;
}

@keyframes borderGlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

.logo-container {
    text-align: center;
    margin-bottom: 24px;
    animation: logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

.logo {
    width: 100px;
    height: 100px;
    margin: 0 auto;
    border-radius: 50%;
    background: linear-gradient(135deg, #0f766e, #1d4ed8, #7c3aed);
    background-size: 200% 200%;
    animation: logoGradient 3s ease infinite;
    box-shadow: 
        0 0 40px rgba(20, 184, 166, 0.6),
        0 0 80px rgba(29, 78, 216, 0.4),
        inset 0 0 30px rgba(0, 0, 0, 0.5);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
}

@keyframes logoGradient {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.logo::before {
    content: '';
    position: absolute;
    inset: 8px;
    background: rgba(2, 28, 27, 0.95);
    border-radius: 50%;
    z-index: 0;
}

.logo-icon {
    font-size: 48px;
    position: relative;
    z-index: 1;
    animation: heartbeat 1.5s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(94, 234, 212, 0.8));
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    10% { transform: scale(1.15); }
    20% { transform: scale(1); }
    30% { transform: scale(1.15); }
    40% { transform: scale(1); }
}

.pulse-ring {
    position: absolute;
    inset: -10px;
    border: 2px solid rgba(94, 234, 212, 0.6);
    border-radius: 50%;
    animation: pulsate 2s ease-out infinite;
}

.pulse-ring:nth-child(2) {
    animation-delay: 0.5s;
}

.pulse-ring:nth-child(3) {
    animation-delay: 1s;
}

@keyframes pulsate {
    0% {
        transform: scale(1);
        opacity: 0.8;
    }
    100% {
        transform: scale(1.5);
        opacity: 0;
    }
}

h2 {
    text-align: center;
    color: #ffffff;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #5eead4, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleShine 3s ease-in-out infinite;
}

@keyframes titleShine {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
}

.tagline {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 40px;
    font-size: 15px;
    letter-spacing: 0.5px;
    opacity: 0;
    animation: fadeInUp 0.8s ease-out 0.3s forwards;
}

@keyframes fadeInUp {
    0% {
        opacity: 0;
        transform: translateY(10px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

.input-group {
    position: relative;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeInUp 0.8s ease-out forwards;
}

.input-group:nth-child(1) { animation-delay: 0.4s; }
.input-group:nth-child(2) { animation-delay: 0.5s; }

input {
    width: 100%;
    padding: 16px 44px 16px 16px;
    background: rgba(2, 28, 27, 0.6);
    border: 1.5px solid rgba(20, 184, 166, 0.2);
    border-radius: 16px;
    color: #e5e7eb;
    font-size: 15px;
    outline: none;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

input:focus {
    border-color: #14b8a6;
    background: rgba(2, 28, 27, 0.8);
    box-shadow: 
        0 0 0 4px rgba(20, 184, 166, 0.1),
        0 0 20px rgba(20, 184, 166, 0.4),
        inset 0 0 20px rgba(20, 184, 166, 0.05);
    transform: translateY(-2px);
}

label {
    position: absolute;
    top: 50%;
    left: 16px;
    transform: translateY(-50%);
    color: #5eead4;
    font-size: 15px;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: transparent;
    padding: 0 6px;
}

input:focus + label,
input:not(:placeholder-shown) + label {
    top: -12px;
    font-size: 12px;
    color: #14b8a6;
    background: rgba(2, 28, 27, 0.95);
    font-weight: 600;
    letter-spacing: 0.5px;
}

.password-toggle {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 20px;
    transition: all 0.3s ease;
    z-index: 2;
}

.password-toggle:hover {
    transform: translateY(-50%) scale(1.2);
}

.login-btn {
    width: 100%;
    margin-top: 24px;
    padding: 18px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #0f766e, #1d4ed8, #7c3aed);
    background-size: 200% 200%;
    color: #ffffff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 30px rgba(29, 78, 216, 0.4);
    opacity: 0;
    animation: fadeInUp 0.8s ease-out 0.6s forwards;
}

.login-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s;
}

.login-btn:hover::before {
    transform: translateX(100%);
}

.login-btn:hover {
    transform: translateY(-4px);
    box-shadow: 
        0 20px 50px rgba(29, 78, 216, 0.5),
        0 0 40px rgba(20, 184, 166, 0.4);
    background-position: 100% 50%;
}

.login-btn:active {
    transform: translateY(-2px);
}

.extra-links {
    text-align: center;
    margin-top: 28px;
    opacity: 0;
    animation: fadeInUp 0.8s ease-out 0.7s forwards;
}

.extra-links a {
    color: #5eead4;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.3s ease;
    position: relative;
}

.extra-links a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #14b8a6, #3b82f6);
    transition: width 0.3s ease;
}

.extra-links a:hover {
    color: #14b8a6;
}

.extra-links a:hover::after {
    width: 100%;
}

.spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top: 2px solid #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@media (max-width: 520px) {
    .login-card {
        width: 90%;
        padding: 40px 32px;
    }
}
</style>
</head>
<body>

<!-- Background Effects -->
<div class="mesh-gradient"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="grid-overlay"></div>

<!-- Floating Particles -->
<div id="particles"></div>

<!-- ECG Lines -->
<div class="ecg-container">
    <div class="ecg-line" style="top: 25%;">
        <svg viewBox="0 0 2000 100" preserveAspectRatio="none">
            <path class="ecg-path" d="M0,50 L200,50 L220,20 L240,80 L260,50 L500,50 L520,30 L540,70 L560,50 L800,50 L820,15 L840,85 L860,50 L1100,50 L1120,25 L1140,75 L1160,50 L1400,50 L1420,20 L1440,80 L1460,50 L1700,50 L1720,30 L1740,70 L1760,50 L2000,50" stroke-dasharray="2000" stroke-dashoffset="0"/>
        </svg>
    </div>
    <div class="ecg-line" style="top: 60%;">
        <svg viewBox="0 0 2000 100" preserveAspectRatio="none">
            <path class="ecg-path" d="M0,50 L300,50 L315,35 L330,65 L345,50 L600,50 L615,25 L630,75 L645,50 L900,50 L915,30 L930,70 L945,50 L1200,50 L1215,20 L1230,80 L1245,50 L1500,50 L1515,35 L1530,65 L1545,50 L1800,50 L1815,25 L1830,75 L1845,50 L2000,50" stroke-dasharray="2000" stroke-dashoffset="0" style="animation-delay: 1s;"/>
        </svg>
    </div>
</div>

<!-- Login Card -->
<div class="login-card">
    <div class="logo-container">
        <div class="logo">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="logo-icon">❤️</div>
        </div>
    </div>

    <h2>CareVision</h2>
    <div class="tagline">AI-Driven Clinical Intelligence</div>

    <!-- CHANGED: Form now submits to Flask login route -->
    <form method="post" action="/login" id="loginForm">
        <div class="input-group">
            <input type="text" placeholder=" " required id="username" name="username">
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" placeholder=" " required id="password" name="password">
            <label>Password</label>
            <span class="password-toggle" onclick="togglePassword()">👁️</span>
        </div>

        <button type="submit" class="login-btn">
            <span class="btn-text">Login Securely</span>
            <div class="spinner"></div>
        </button>
    </form>

    <div class="extra-links">
        <a href="#" onclick="demoLogin()">Demo Login</a> | 
        <a href="#">Privacy Policy</a>
    </div>
</div>

<script>
// Create Particles
const particleContainer = document.getElementById('particles');
const particleCount = 30;

for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    particle.style.left = Math.random() * window.innerWidth + 'px';
    particle.style.top = Math.random() * window.innerHeight + 'px';
    particle.style.width = particle.style.height = (Math.random() * 4 + 2) + 'px';
    particle.style.animationDuration = (Math.random() * 12 + 8) + 's';
    particle.style.animationDelay = Math.random() * 5 + 's';
    particleContainer.appendChild(particle);
}

// Password Toggle
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggle = document.querySelector('.password-toggle');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggle.textContent = '🙈';
    } else {
        passwordInput.type = 'password';
        toggle.textContent = '👁️';
    }
}

// Demo login for testing
function demoLogin() {
    document.getElementById('username').value = 'demo';
    document.getElementById('password').value = 'demo123';
}

// Form Submission with Animation
document.getElementById('loginForm').addEventListener('submit', function(e) {
    // Remove the timeout simulation for actual submission
    const btn = document.querySelector('.login-btn');
    const btnText = document.querySelector('.btn-text');
    const spinner = document.querySelector('.spinner');
    
    // Show loading state
    btnText.style.display = 'none';
    spinner.style.display = 'block';
    btn.disabled = true;
    
    // Let the form submit normally to Flask
    // Flask will handle the redirect
});

// Add input focus effects
document.querySelectorAll('input').forEach(input => {
    input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.02)';
    });
    
    input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
    });
});
</script>

</body>
</html>
